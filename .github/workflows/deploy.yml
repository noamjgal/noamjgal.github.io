name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Maintenance mode: deploys only maintenance/ until the Jekyll build is restored below.
      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload maintenance page
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./maintenance

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # To relaunch the full site, replace the upload step above with:
      # - uses: ruby/setup-ruby@v1
      #   with: { ruby-version: '3.2', bundler-cache: true }
      # - run: bundle exec jekyll build --baseurl ""
      # - uses: actions/upload-pages-artifact@v3
      #   with: { path: ./_site }
